<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Card Studio Pro</title>
<style>
body{margin:0;font-family:Arial;background:#0b1620;color:#fff}
.container{max-width:900px;margin:auto;padding:20px}
h1{color:#f5ddb0}
input,textarea,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
button{padding:12px;border:none;border-radius:10px;background:gold;font-weight:bold;margin:5px;cursor:pointer}
.card{border:1px solid #333;border-radius:20px;padding:20px;text-align:center;background:#111;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h1>Eid Card Studio PRO</h1>

<label>Names (comma separated)</label>
<textarea id="names">Ahmed, Ali, Fatima</textarea>

<label>Message</label>
<textarea id="msg">Eid Mubarak! May Allah bless you.</textarea>

<label>Theme</label>
<select id="theme">
<option value="#111">Dark</option>
<option value="#1b4332">Green</option>
<option value="#2c2c54">Purple</option>
<option value="#000">Black Gold</option>
</select>

<button onclick="generate()">Generate Cards</button>
<button onclick="download()">Download PNG</button>

<div id="output"></div>
</div>

<script>
function generate(){
  const names = document.getElementById("names").value.split(",");
  const msg = document.getElementById("msg").value;
  const theme = document.getElementById("theme").value;
  const out = document.getElementById("output");
  out.innerHTML = "";

  names.forEach(name=>{
    const div = document.createElement("div");
    div.className="card";
    div.style.background = theme;
    div.innerHTML = "<h2>Eid Mubarak</h2><p>Dear "+name.trim()+"</p><p>"+msg+"</p>";
    out.appendChild(div);
  });
}

function download(){
  alert("Use screenshot for now or next version will auto-export images.");
}
</script>
</body>
</html>
